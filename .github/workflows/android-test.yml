name: Android Instrumented Tests

on:
  workflow_run:
    workflows: ["Android CI"]
    types: [completed]
    branches: [main, dev*]

jobs:
  instrumented-tests:
    name: Run instrumented tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Delete unnecessary tools
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: false
          tool-cache: true
          dotnet: true
          haskell: true
          swap-storage: true
          docker-images: false
          large-packages: false

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          script: |
            ./gradlew connectedDebugAndroidTest --daemon

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-${{ matrix.api-level }}
          path: '**/build/reports/androidTests'

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/outputs/androidTest-results/

      - name: Notify Feishu
        if: always()
        run: |
          STATUS="${{ job.status }}"
          TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          # Calculate duration from workflow_run context
          START_TS=$(date -d "${{ github.event.workflow_run.run_started_at }}" +%s 2>/dev/null || echo "0")
          END_TS=$(date -d "${{ github.event.workflow_run.updated_at }}" +%s 2>/dev/null || echo "0")
          DURATION=$((END_TS - START_TS))
          HOURS=$((DURATION / 3600))
          MINS=$(((DURATION % 3600) / 60))
          SECS=$((DURATION % 60))
          DURATION_STR=$(printf "%02d:%02d:%02d" $HOURS $MINS $SECS)
          if [ "$STATUS" = "success" ]; then
            MSG="✅ Android Instrumented Tests 测试成功"
          else
            MSG="❌ Android Instrumented Tests 测试失败"
          fi
          curl -X POST "${{ secrets.FEISHU_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$MSG\n\n⏰ 通知时间: $TIME\n⏱️ 耗时: $DURATION_STR\n📦 仓库: yiranlau/my-study\n🌿 分支: ${{ github.ref_name }}\n👤 触发人: ${{ github.actor }}\n🔗 查看详情: https://github.com/yiranlau/my-study/actions/runs/${{ github.run_id }}\"}}"

